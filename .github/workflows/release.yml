name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --frozen
      - run: make check
      - run: uv build
      - name: Smoke-test built wheel
        shell: bash
        run: |
          wheel="$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          uv venv .release-venv --python 3.12
          uv pip install --python .release-venv/bin/python "$wheel"
          HOMOGRAPH_BEL_CACHE="$RUNNER_TEMP/homograph-bel-cache" \
            .release-venv/bin/homograph-bel dictionary list --limit 1
      - name: Add standalone dictionary and checksums
        shell: bash
        run: |
          cp src/homograph_bel/resources/dictionary-v2-RELEASE-202601.tar.gz dist/
          cp DATA_LICENSE.md NOTICE.md LICENSES/CC-BY-SA-4.0.txt dist/
          cd dist
          sha256sum * > SHA256SUMS
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" dist/*
          --generate-notes
          --title "homograph-bel $GITHUB_REF_NAME"
